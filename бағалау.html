<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ерлік сабағы — Бағалау Парағы</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --gold: #FFD700;
            --warrior-red: #8B0000;
            --kazakh-blue: #00BFFF;
            --deep-blue: #003366;
            --body-bg: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #1a202c;
            --neon-glow: 0 0 10px #FFD700, 0 0 20px #FFD700; /* Неон жарқылы */
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow-x: hidden;
            background: var(--body-bg);
            background-image: radial-gradient(circle at center, #ffffff 0%, #d1d9e6 100%);
            font-family: 'Times New Roman', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.05;
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
            pointer-events: none;
            z-index: -1;
        }

        .main-container {
            width: 95%;
            max-width: 1600px;
            padding: 30px 20px;
            box-sizing: border-box;
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
            background: var(--deep-blue);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border-bottom: 5px solid var(--gold);
            color: white;
        }

        .neon-title {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin: 0 0 15px 0;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 25px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 50px;
            font-size: 0.9rem;
            transition: all 0.3s;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .download-btn {
            background: var(--gold);
            color: var(--deep-blue);
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }

        .clear-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .clear-btn:hover {
            background: var(--warrior-red);
            border-color: var(--warrior-red);
        }

        .students-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 30px;
            width: 100%;
        }

        .student-card {
            background: var(--card-bg);
            border: 2px solid #d1d9e6;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .student-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .student-name {
            width: 100%;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            color: var(--text-main);
            padding: 8px;
            margin-bottom: 12px;
            text-align: center;
            outline: none;
            box-sizing: border-box;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
        }

        .student-name:focus {
            border-color: var(--kazakh-blue);
            background: #fff;
        }

        .rating-box {
            display: flex;
            justify-content: center;
            gap: 2px;
            margin-bottom: 10px;
            padding: 5px;
            background: #f8fafc;
            border-radius: 10px;
        }

        .spear {
            font-size: 20px;
            cursor: pointer;
            filter: grayscale(1) opacity(0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            display: inline-block;
        }

        /* Қылыш белсенді болғандағы неон эффектісі */
        .spear.active {
            filter: grayscale(0) opacity(1) drop-shadow(0 0 5px var(--gold));
            transform: scale(1.2);
            text-shadow: var(--neon-glow);
        }

        .spear:hover {
            transform: scale(1.3);
            filter: grayscale(0) opacity(0.8);
        }

        .status-msg {
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 6px;
            display: inline-block;
        }
    </style>
</head>
<body>
    
    <div class="main-container">
        <div class="header-section">
            <h1 class="neon-title">ЕРЛІК САБАҒЫ: БАТЫРЛАР ЖОЛЫ</h1>
            <div class="btn-group">
                <button class="btn download-btn" onclick="downloadExcel()">📊 НӘТИЖЕНІ ЖҮКТЕУ</button>
                <button class="btn clear-btn" onclick="clearAllData()">🗑️ ТАЗАЛАУ</button>
            </div>
        </div>
                
        <div class="students-grid" id="grid"></div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        let studentData = Array(30).fill(0).map((_, i) => ({ id: i, name: '', score: 0 }));

        function initGrid() {
            grid.innerHTML = '';
            const savedData = localStorage.getItem('erlik_sabaqy_data_v2');
            if (savedData) {
                const parsed = JSON.parse(savedData);
                studentData = studentData.map((s, i) => parsed[i] || s);
            }

            for (let i = 0; i < 30; i++) {
                const card = document.createElement('div');
                card.className = 'student-card';
                card.innerHTML = `
                    <input type="text" class="student-name" id="input-${i}" 
                           placeholder="${i+1}-оқушы есімі..." 
                           value="${studentData[i].name}" 
                           oninput="updateName(${i}, this.value)">
                    <div class="rating-box" id="rating-${i}">
                        ${Array(10).fill(0).map((_, j) => `
                            <span class="spear ${j < studentData[i].score ? 'active' : ''}" 
                                  onclick="rate(${i}, ${j + 1})">🗡️</span>
                        `).join('')}
                    </div>
                    <div class="status-msg" id="msg-${i}">ДАЙЫНДЫҚТА</div>
                `;
                grid.appendChild(card);
                updateStatusMsg(i, studentData[i].score);
            }
        }

        function updateName(id, val) { 
             studentData[id].name = val; 
             saveToLocal();
        }

        function rate(studentId, score) {
            // Егер қазіргі ұпайды қайта басса, нөлге түсіру мүмкіндігі (опционалды)
            if (studentData[studentId].score === score) {
                studentData[studentId].score = 0;
            } else {
                studentData[studentId].score = score;
            }
            
            const newScore = studentData[studentId].score;

            if (newScore >= 9) {
                confetti({
                    particleCount: 80,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#FFD700', '#8B0000', '#00BFFF']
                });
            }
            
            const container = document.getElementById(`rating-${studentId}`);
            const spears = container.querySelectorAll('.spear');
            
            spears.forEach((s, index) => {
                if (index < newScore) s.classList.add('active');
                else s.classList.remove('active');
            });

            updateStatusMsg(studentId, newScore);
            saveToLocal();
        }

        function updateStatusMsg(studentId, score) {
            const msg = document.getElementById(`msg-${studentId}`);
            if (!msg) return;

            if (score === 0) {
                msg.innerText = "ДАЙЫНДЫҚТА";
                msg.style.color = "#94a3b8";
                msg.style.background = "#f1f5f9";
            } else if (score <= 3) {
                msg.innerText = "САРБАЗ";
                msg.style.color = "#4a5568";
                msg.style.background = "#edf2f7";
            } else if (score <= 5) {
                msg.innerText = "ҰЛАН";
                msg.style.color = "#2b6cb0";
                msg.style.background = "#ebf8ff";
            } else if (score <= 7) {
                msg.innerText = "МЕРГЕН";
                msg.style.color = "#c05621";
                msg.style.background = "#fffaf0";
            } else if (score <= 9) {
                msg.innerText = "БАТЫР";
                msg.style.color = "#9b2c2c";
                msg.style.background = "#fff5f5";
            } else {
                msg.innerText = "ҚАҺАРМАН";
                msg.style.color = "#ffffff";
                msg.style.background = "linear-gradient(to right, #FFD700, #B8860B)";
            }
        }

        function saveToLocal() {
            localStorage.setItem('erlik_sabaqy_data_v2', JSON.stringify(studentData));
        }

        function clearAllData() {
            if (confirm("Барлық деректерді өшіруді растайсыз ба?")) {
                localStorage.removeItem('erlik_sabaqy_data_v2');
                studentData = Array(30).fill(0).map((_, i) => ({ id: i, name: '', score: 0 }));
                initGrid();
            }
        }

        function downloadExcel() {
            let csvContent = "\uFEFFОқушы есімі;Жинаған ұпайы\n";
            studentData.forEach((s, index) => {
                let name = s.name || `${index + 1}-оқушы`;
                csvContent += `${name};${s.score}\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Erlik_Sabaqy_30_Students.csv";
            link.click();
        }

        initGrid();
    </script>
</body>
</html>
